name: sourcely
description: "A multi-source RAG knowledge assistant — upload sources, chat with AI, get cited answers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.2

  # State Management
  provider: ^6.1.2

  # Supabase
  supabase_flutter: ^2.8.4

  # HTTP & Networking
  http: ^1.3.0
  http_parser: ^4.1.0

  # File Handling
  file_picker: ^8.1.7
  mime: ^2.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#120B29"
  image_path: "assets/icon.png"
